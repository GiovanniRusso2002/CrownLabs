query tenant($tenantId: String!) {
  tenant: itPolitoCrownlabsV1alpha2Tenant(name: $tenantId) {
    spec {
      email
      firstName
      lastName
      lastLogin
      personalWorkspace {
        cpu
        instances
        memory
      }
      workspaces {
        role
        name
      }
      publicKeys
    }
    metadata {
      name
    }
    status {
      personalNamespace {
        name
        created
      }
    }
  }
}
