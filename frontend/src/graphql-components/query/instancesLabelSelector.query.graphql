query instancesLabelSelector($labels: String) {
  instanceList: itPolitoCrownlabsV1alpha2InstanceList(labelSelector: $labels) {
    instances: items {
      metadata {
        name
        namespace
        creationTimestamp
      }
      status {
# ip # Campo rimosso dallo schema
        phase
        url
        nodeName
        nodeSelector
        publicExposure {
          externalIP
          phase
          ports {
            name
            port
            protocol
            targetPort
          }
        }
        environments {
          name
          phase
# ip # Campo rimosso dallo schema
        }
      }
      spec {
        running
        prettyName
        publicExposure {
          ports {
            name
            port
            targetPort
            protocol
          }
        }
        tenantCrownlabsPolitoItTenantRef {
          name
        }
        templateCrownlabsPolitoItTemplateRef {
          name
          namespace
          templateWrapper {
            itPolitoCrownlabsV1alpha2Template {
              spec {
                prettyName
                description
                allowPublicExposure
                environmentList {
                  name
                  guiEnabled
                  persistent
                  environmentType
                }
              }
            }
          }
        }
      }
    }
  }
}
